spring:
  application:
    name: srm-credit-engine

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

# ── Configurações comuns a todos os perfis ───────────────────
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    br.com.srm: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: WARN

---
# ── Perfil DEV — H2 em memória (sem Docker) ──────────────────
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:h2:mem:srm_dev;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    # Garante que data.sql rode APÓS o Hibernate criar o schema (Spring Boot 2.5+)
    defer-datasource-initialization: true

  sql:
    init:
      mode: always

  flyway:
    enabled: false

  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    br.com.srm: DEBUG
    org.hibernate.SQL: DEBUG

---
# ── Perfil PROD — PostgreSQL 16 (Docker Compose) ─────────────
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/srm_credit}
    username: ${SPRING_DATASOURCE_USERNAME:srm}
    password: ${SPRING_DATASOURCE_PASSWORD:srm123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000

  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

  sql:
    init:
      mode: never
